# hr vault config. Add or remove feeds below, then `hr sync`.

[[feeds]]
url  = "https://go.dev/blog/feed.atom"
name = "go-blog"
tags = ["go"]

# Sort order for `hr list` / `hr feed`. "desc" = newest first.
ordering = "desc"

# Mark items read when their file is opened (requires nvim autocmd).
autoread = false

# User-Agent for HTTP requests.
user_agent = "hr/0.1"
